orbs:
  qlty-orb: qltysh/qlty-orb@0.1.1

job_defaults: &job_defaults
  docker:
    - image: cimg/node:18.20
  working_directory: ~/repo

step_defaults: &step_defaults

version: 2.1
jobs:
  build:
    <<: *job_defaults
    steps:
      - checkout
      # Download and cache dependencies
      - restore_cache:
          keys:
          - v1-dependencies-{{ checksum "yarn.lock" }}
          # fallback to using the latest cache if no exact match is found
          - v1-dependencies-
      - run: yarn install
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "yarn.lock" }}
      - persist_to_workspace:
          root: ~/repo
          paths:
            - node_modules

  test:
    <<: *job_defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      - run: yarn test --collectCoverage=true
      - qlty-orb/coverage_publish:
          files: "coverage/lcov.info"

  qlty_coverage_complete:
    <<: *job_defaults
    steps:
      - checkout
      - qlty-orb/coverage_complete

  lint:
    <<: *job_defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      - run: yarn lint

workflows:
  version: 2
  build-test-and-deploy:
    jobs:
      - build
      - test:
          requires:
            - build
      - lint:
          requires:
            - build
      - qlty_coverage_complete:
          requires:
            - test
